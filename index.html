<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Cancon Archives — Вики РВПИ</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="База знаний РВПИ сервера">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Официальная стабильная темная тема -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <style>
    /* Кастомная перекраска элементов под идеальный темный стиль */
    :root {
      --theme-color: #ff4500; /* Цвет активных ссылок и акцентов (огненно-рыжий) */
    }
    body {
      background-color: #0b0c0f !important; /* Угольно-черный фон сайта */
      color: #f5f5f7 !important;            /* Белый цвет основного текста */
    }
    .sidebar {
      background-color: #121318 !important; /* Более светлый оттенок черного для меню */
      border-right: 1px solid #1a1b23 !important;
    }
    .sidebar-nav strong {
      color: #ffffff !important;            /* Белый цвет для заголовков в меню */
    }
    .search input {
      background-color: #1c1d24 !important; /* Цвет поля поиска */
      color: #ffffff !important;
      border: 1px solid #2d2f39 !important;
    }
    
    /* ФИКС КНОПКИ: Делаем её аккуратной и маленькой наверху */
    .sidebar-toggle {
      bottom: auto !important;
      top: 15px !important;
      left: 315px !important; /* Рядом с краем открытого меню */
      background: transparent !important; /* Убираем громоздкий фон */
      border: none !important;            /* Убираем рамки */
      padding: 5px !important;            /* Уменьшаем размер */
      width: auto !important;
      height: auto !important;
    }
    /* Сдвигаем кнопку обратно к левому краю, когда меню скрыто */
    body.close .sidebar-toggle {
      left: 15px !important;
    }
    /* Делаем три полоски внутри кнопки аккуратными и белыми */
    .sidebar-toggle span {
      background: #ffffff !important;
      width: 18px !important;
      height: 2px !important;
      margin-bottom: 3px !important;
    }
  </style>
</head>
<body>
  <div id="app">Загрузка Вики...</div>
  
  <script>
    window.$docsify = {
      name: 'Cancon Archives',
      repo: '',
      loadSidebar: true, // Включение чтения меню из _sidebar.md
      subMaxLevel: 2,    // Автоматическое добавление подзаголовков статей в меню
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Поиск по архивам...',
        noData: 'Ничего не найдено!',
        depth: 6
      }
    }
  </script>

  <!-- Главные скрипты движка и плагинов -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
