<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Cancon Archives — Вики РВПИ</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="База знаний РВПИ сервера">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Ваша красивая оригинальная темная тема -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <style>
    :root {
      --base-background-color: #0b0c0f !important; /* Угольно-черный фон */
      --base-color: #f5f5f7 !important;            /* Чистый белый текст */
      --sidebar-background: #121318 !important;    /* Чуть более светлый черный для меню */
      --theme-color: #ff4500 !important;           /* Огненно-рыжий акцент для ссылок */
    
    /* РАСШИРЕНИЕ КОНТЕНТА: Задаем максимальную ширину текста на 85% экрана вместо стандартных 40-50% */
      --content-max-width: 85% !important;
    }
    /* Делаем полоски кнопки ☰ тонкими и белыми */
    .sidebar-toggle span {
      background-color: #ffffff !important;
      height: 2px !important;
    }
  </style>
</head>
<body>
  <div id="app">Загрузка Вики...</div>
  
  <script>
    window.$docsify = {
      name: 'Cancon Archives',
      repo: '',
      search: 'auto',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
  
  <!-- Главные скрипты движка Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
